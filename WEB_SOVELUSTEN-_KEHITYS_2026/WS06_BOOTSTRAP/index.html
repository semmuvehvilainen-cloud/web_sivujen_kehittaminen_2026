<button type="button" class="btn btn-primary" onclick="showJoke()">joke</button>

<p id="jokeText" class="mt-3"></p>

<script>
const jokes = [
  "Miksi Liisa putosi keinusta? koska hänellä ei ole käsiä.   kop kop. kuka siellä? ei ainakaan Liisa.",
  "paistoin kerran peuraa. se paloi poroksi. lopputulos oli hirveä.",
  "Miksi mustekala on aina kännissä? Koska sillä on kahdeksan lonkeroa.",
  "Mikä on maailman chillein eläin? Yo zen."
];

function showJoke() {
  const randomIndex = Math.floor(Math.random() * jokes.length);
  document.getElementById("jokeText").textContent = jokes[randomIndex];
}
</script>

<button class="btn btn-secondary" onclick="changeBackground()">
  Change Background Color
</button>

<script>
function changeBackground() {
  const colors = [
    "#ffadad", "#ffd6a5", "#fdffb6", "#caffbf",
    "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff", "#fffffc"
  ];

  const randomColor = colors[Math.floor(Math.random() * colors.length)];
  document.body.style.backgroundColor = randomColor;
}


</script>
<button class="btn btn-success" onclick="bugPage()">surprise</button>

<p id="msg" style="display:none; font-size:2rem; text-align:center;">
  😄 pränkki!
</p>

<script>
function bugPage() {
  const msg = document.getElementById("msg"); 

  document.body.style.transition = "transform 0.1s, opacity 0.5s";

  let count = 0;

  const glitch = setInterval(() => {
    const x = (Math.random() - 0.5) * 20;
    const y = (Math.random() - 0.5) * 20;

    document.body.style.transform = `translate(${x}px, ${y}px)`;

    count++;

    if (count > 20) {
      clearInterval(glitch);

      document.body.style.transform = "translate(0,0)";
      document.body.style.opacity = "0";

      setTimeout(() => {
        msg.style.display = "block";
        document.body.style.opacity = "1";
      }, 2000);

      setTimeout(() => {
        msg.style.display = "none";
      }, 3500);
    }
  }, 80);
}
</script>
