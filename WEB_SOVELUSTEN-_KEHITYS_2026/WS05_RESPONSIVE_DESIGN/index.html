<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semmun sivu</title>
    <style>.responsive-container {
      display: flex;
      flex-wrap: wrap;
    }
    
    .column {
      flex: 1;
      padding: 10px;
    }
    
    @media (max-width: 600px) {
      .column {
        flex: 100%;
      }
    }

    .responsive-image {
      max-width: 100%;
      height: auto;
    }
    .media-query-box {
      padding: 20px;
      text-align: center;
    }
    
    @media (max-width: 600px) {
      .media-query-box {
        background-color: lightcoral;
      }
    }
    
    @media (min-width: 601px) {
      .media-query-box {
        background-color: lightblue;
      }
    }

    .responsive-nav .nav-list {
      display: flex;
      list-style: none;
    }
    
    @media (max-width: 600px) {
      .responsive-nav .nav-list {
        display: none;
      }
    
      .responsive-nav .menu-toggle {
        display: block;
      }
    }
    .nav-list {
  list-style: none;
  display: flex;
  gap: 20px;   
  margin: 0;
  padding: 0;
}
</style>

</head>
<body>
    <header>
        <h1>Semmun sivu</h1>

    </header>
 <img src="oma_kuva.jpg" alt="Semmun kuva" width="100" height="100" class="responsive-image" >   

<div class="responsive-container">
      <div class="column">Column 1</div>
      <div class="column">Column 2</div>
    </div>

    <div class="media-query-box">Resize the window to see the effect</div>
    <nav class="responsive-nav">
      <button class="menu-toggle">☰ Menu</button>
      <ul class="nav-list">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <h2>home</h2>
    <h2>About</h2>
    <h2>Contact</h2>

</body>
</html>
